<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>お客様情報</legend>
            <table>
            <tr>
                <td>お名前:</td>
                <td><input type="text"><i class="fa-solid fa-user"></i></td>
            </tr>
            <tr>
                <td>電話番号:</td>
                <td><input type="text"><i class="fa-solid fa-phone"></i></td>
            </tr>
            <tr>
                <td>メール:</td>
                <td><input type="text" placeholder="abc@gmail.com"><i class="fa-regular fa-envelope"></i></td>
            </tr>
            <tr>
                <td>性別</td>
                <td>
                    男性<input type="radio" name="g">
                    女性<input type="radio" name="g">
                    その他<input type="radio" name="g">
                </td>
            </tr>
        </table>
        </fieldset>
        <fieldset>
            <legend>お問い合わせ内容</legend>
            <table>
                <tr>
                    <td>こちらにお書きください</td>
                    <td><textarea name="" id=""></textarea></td>
                </tr>
            </table>
        </fieldset>
    </form>
    <button>送信</button>
    <button>リセット</button>
</body>
</html>
